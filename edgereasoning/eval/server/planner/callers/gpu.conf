# GPU Configuration for Natural-Plan Evaluation
# Format: GPU_MAP[model,task]=gpu_id
#
# Edit these mappings based on your available GPUs
# For single GPU setup, set all values to 0
# For dual GPU setup, use 0 and 1, etc.

# 14B model assignments
# GPU_MAP_14b_trip=0
# GPU_MAP_14b_meeting=1  
# GPU_MAP_14b_calendar=2

# # 8B model assignments  
# GPU_MAP_8b_trip=3
# GPU_MAP_8b_meeting=4
# GPU_MAP_8b_calendar=5

# # 1.5B model assignments
# GPU_MAP_1_5b_trip=6
# GPU_MAP_1_5b_meeting=7
# GPU_MAP_1_5b_calendar=7

# Single GPU setup (uncomment to use GPU 0 for everything)
GPU_MAP_14b_trip=0
GPU_MAP_14b_meeting=1
GPU_MAP_14b_calendar=0
GPU_MAP_8b_trip=0
GPU_MAP_8b_meeting=0
GPU_MAP_8b_calendar=0
GPU_MAP_1_5b_trip=0
GPU_MAP_1_5b_meeting=0
GPU_MAP_1_5b_calendar=0
